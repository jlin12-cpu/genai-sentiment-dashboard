name: Weekly GenAI Data Update

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas google-play-scraper textblob python-dotenv \
                      anthropic gspread google-auth

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/scraper.py

      - name: Run clean_data
        run: python scraper/clean_data.py

      - name: Run build_dashboard_data
        run: python dashboard/build_dashboard_data.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/insights_data.json logs/
          git diff --staged --quiet || git commit -m "Weekly data update $(date +'%Y-%m-%d')"
          git push
